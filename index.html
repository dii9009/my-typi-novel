<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cloud Studio v5.72</title>
    <style>
        /* [1. 기본 레이아웃 및 아이폰 흔들림 방지] */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --font-size: 1.15rem; --line-height: 1.85; --primary-blue: #4a90e2; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #1a1a1a; color: #d4d4d4; 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            overflow: hidden; position: fixed; 
        }
        
        .app-container { display: flex; width: 100vw; height: 100vh; overflow: hidden; position: relative; }

        /* [2. 사이드바 및 리스트 디자인] */
        .sidebar { 
            width: 280px; min-width: 280px; height: 100%; 
            background: #111; border-right: 1px solid #333; 
            padding: 20px; display: flex; flex-direction: column; 
            z-index: 1000; transition: transform 0.3s;
        }
        @media (max-width: 768px) { 
            .sidebar { position: fixed; left: 0; transform: translateX(-100%); } 
            .sidebar.active { transform: translateX(0); } 
        }
        
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .sidebar-header h2 { font-size: 0.75rem; color: #444; letter-spacing: 2px; margin: 0; cursor: pointer; }
        
        .tab-menu { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .tab-btn { flex: 1; padding: 8px; font-size: 0.7rem; background: none; border: 1px solid #333; color: #555; cursor: pointer; border-radius: 4px; }
        .tab-btn.active { background: #2a2a2a; color: #fff; border-color: var(--primary-blue); }

        .sidebar-content { flex: 1; overflow-y: auto; overflow-x: hidden; }
        .hidden { display: none !important; }

        .folder-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 8px; cursor: pointer; color: #bbb; font-weight: bold; font-size: 0.85rem; border-bottom: 1px solid #222; }
        .chapter-list { list-style: none; padding: 0 0 0 10px; margin: 5px 0; min-height: 20px; }
        
        /* 챕터 아이템 클릭 최적화 */
        .chapter-item-container { 
            display: flex; justify-content: space-between; align-items: center; 
            border-radius: 4px; margin-bottom: 2px; cursor: pointer; 
            background: #1a1a1a; transition: all 0.15s;
            border: 1px solid transparent;
        }
        .chapter-item-container:active { background: #333; transform: scale(0.98); }
        .chapter-item-container.active { background: #252525 !important; border-left: 3px solid var(--primary-blue); }
        .chapter-item-container.dragging { opacity: 0.3; border: 1px dashed var(--primary-blue); }
        
        .chapter-item { 
            flex: 1; padding: 12px 10px; font-size: 0.85rem; color: #888; 
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; 
            pointer-events: none; /* 클릭이 부모에게 백퍼센트 전달되도록 */
        }
        
        .delete-btn { 
            width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; color: #444; opacity: 0.5; transition: 0.2s; flex-shrink: 0; cursor: pointer;
        }
        .delete-btn:hover { color: #ff4d4d; opacity: 1; }

        /* [3. 메인 컨텐츠 영역] */
        .main-content { 
            flex: 1; height: 100%; overflow-y: auto; overflow-x: hidden; 
            background: #1a1a1a; display: flex; flex-direction: column; 
            align-items: center; padding: 40px 20px 160px 20px; 
            box-sizing: border-box; -webkit-overflow-scrolling: touch;
        }
        .editor-container { width: 100%; max-width: 800px; position: relative; }
        #chapter-title { width: 100%; font-size: 1.8rem; border: none; background: transparent; color: #fff; outline: none; margin-bottom: 30px; font-weight: bold; }
        
        #editor { 
            width: 100%; min-height: 70vh; 
            font-size: var(--font-size); line-height: var(--line-height); 
            color: #d4d4d4; outline: none; 
            white-space: break-spaces; word-break: break-all; 
            padding-bottom: 300px; text-decoration-skip-ink: none; 
        }
        #editor div, #editor p { margin: 0 !important; padding: 0 !important; min-height: 1.2em; }

        /* [4. 상태바] */
        .status-bar { position: fixed; bottom: 0; left: 280px; right: 0; background: #111; border-top: 1px solid #222; z-index: 998; }
        @media (max-width: 768px) { .status-bar { left: 0; } }
        .status-info { padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; }
        #progress-bar { height: 3px; background: var(--primary-blue); width: 0%; transition: 0.3s; }
        
        #lock-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #111; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #lock-screen input { padding: 15px; width: 220px; border-radius: 8px; border: 1px solid #333; background: #222; color: white; font-size: 1.2rem; text-align: center; outline: none; }
        #lock-screen button { margin-top: 15px; padding: 10px 40px; background: var(--primary-blue); border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .menu-toggle { position: fixed; top: 15px; left: 15px; z-index: 2000; background: #222; color: white; border: none; padding: 10px 15px; border-radius: 8px; display: none; }
        @media (max-width: 768px) { .menu-toggle { display: block; } }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h2 style="color:var(--primary-blue); letter-spacing:4px;">STUDIO LOCK</h2>
        <input type="password" id="pw-input" placeholder="Password" onkeypress="if(event.keyCode==13) checkAuth()">
        <button onclick="checkAuth()">ENTER</button>
    </div>

    <button class="menu-toggle" onclick="toggleSidebar()">☰ 메뉴</button>
    
    <div class="app-container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header"><h2 onclick="location.reload()">CLOUD STUDIO</h2><span onclick="location.reload()" style="cursor:pointer; color:var(--primary-blue); font-size:1.2rem;">↻</span></div>
            <div class="tab-menu">
                <button class="tab-btn active" id="tab-epi" onclick="switchTab('epi')">📝 에피소드</button>
                <button class="tab-btn" id="tab-world" onclick="switchTab('world')">🌎 설정/메모</button>
            </div>
            <div id="content-epi" class="sidebar-content">
                <div style="display:flex; gap:8px; margin-bottom:20px;">
                    <button onclick="addNewFolder()" style="flex:1; padding:10px; background:#2a2a2a; border:1px solid #444; color:#fff; border-radius:6px; font-size:0.75rem;">📁 폴더</button>
                    <button onclick="addNewChapter()" style="flex:1; padding:10px; background:#2a2a2a; border:1px solid #444; color:#fff; border-radius:6px; font-size:0.75rem;">📝 에피</button>
                </div>
                <div id="folder-list">데이터 로딩 중...</div>
            </div>
            <div id="content-world" class="sidebar-content hidden">
                <textarea id="world-memo-area" style="width:100%; height:85%; background:transparent; border:none; color:#888; font-size:0.85rem; line-height:1.7; outline:none; resize:none; padding:10px; box-sizing:border-box;" placeholder="세계관 설정을 기록하세요..."></textarea>
            </div>
        </div>

        <div class="main-content" id="main-scroll-area" onclick="closeSidebar();">
            <div class="editor-container">
                <div style="display:flex; gap:8px; margin-bottom:20px; justify-content:flex-end;">
                    <button onclick="copyAllText()" style="background:none; border:1px solid #333; color:#aaa; padding:6px 12px; border-radius:4px; font-size:0.75rem; cursor:pointer;">📋 복사</button>
                    <button onclick="restoreVersion()" style="background:none; border:1px solid #333; color:#888; padding:6px 12px; border-radius:4px; font-size:0.75rem; cursor:pointer;">⏳ 복구</button>
                    <button onclick="exportText()" style="background:none; border:1px solid #333; color:#888; padding:6px 12px; border-radius:4px; font-size:0.75rem; cursor:pointer;">💾 TXT</button>
                </div>
                <input type="text" id="chapter-title" placeholder="제목을 입력하세요">
                <div id="editor" contenteditable="true" spellcheck="true" lang="ko"></div>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <div id="progress-bar"></div>
        <div class="status-info">
            <div>
                <span onclick="setGoal()" style="cursor:pointer; text-decoration:underline; margin-right:10px; color:#888;">목표:<span id="display-goal">5,000</span></span>
                <span onclick="setFontSize()" style="cursor:pointer; text-decoration:underline; color:#888;">글자:<span id="display-font">1.15</span></span>
            </div>
            <div style="display:flex; align-items:center; gap:5px;">
                <span id="last-save-time" style="color:#555; margin-right:10px;">저장 기록 없음</span>
                <div id="word-count" style="margin-right:10px;">0자</div>
                <div id="sync-status" style="font-weight:bold;">●</div>
                <span style="color:#222; font-weight:bold; margin-left:10px;">v5.72</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, deleteDoc, collection, onSnapshot, query, orderBy, writeBatch, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
 apiKey: "AIzaSyC4FjTYr8xxPH9y7H13h8EzIf-CxKb8QkI",
  authDomain: "my-typi-app.firebaseapp.com",
  projectId: "my-typi-app",
  storageBucket: "my-typi-app.firebasestorage.app",
  messagingSenderId: "793573516752",
  appId: "1:793573516752:web:2b3d20a8c432a0b5d445d5"
 };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        enableIndexedDbPersistence(db).catch(() => {});

        document.execCommand('defaultParagraphSeparator', false, 'div');

        const editor = document.getElementById('editor');
        const titleInput = document.getElementById('chapter-title');
        const worldMemo = document.getElementById('world-memo-area');
        const syncStatus = document.getElementById('sync-status');
        const lastSaveDisplay = document.getElementById('last-save-time');

        let currentChapterId = localStorage.getItem('lastChapterId') || '';
        let currentFolderId = localStorage.getItem('lastFolderId') || 'none';
        let isTyping = false;
        let isComposing = false; 
        let lastSavedContent = "";
        let saveTimer;
        let typingEndTimer;
        let settings = { goalWords: 5000, fontSize: 1.15, studioPw: "0000" };
        let foldersData = [];
        let chaptersData = [];

        // --- 데이터 로직 ---
        function startApp() {
            onSnapshot(query(collection(db, "folders"), orderBy("createdAt", "asc")), (snap) => {
                foldersData = []; snap.forEach(d => foldersData.push({id: d.id, ...d.data()}));
                renderAll();
            });

            onSnapshot(collection(db, "myNovels"), (snap) => {
                syncStatus.style.color = "#4ade80";
                chaptersData = []; snap.forEach(d => chaptersData.push({id: d.id, ...d.data()}));
                chaptersData.sort((a, b) => (a.order || 0) - (b.order || 0) || (a.createdAt || 0) - (b.createdAt || 0));
                renderAll();
                
                if(!isTyping && currentChapterId) {
                    const current = chaptersData.find(c => c.id === currentChapterId);
                    if(current && editor.innerHTML === "") {
                        titleInput.value = current.title;
                        editor.innerHTML = current.content;
                        lastSavedContent = current.content;
                        lastSaveDisplay.innerText = formatTime(current.updatedAt);
                        updateWordCount();
                    }
                }
            });
        }

        function renderAll() {
            const listUI = document.getElementById('folder-list');
            listUI.innerHTML = '';
            const unclassified = chaptersData.filter(c => !c.folderId);
            if(unclassified.length > 0) listUI.appendChild(renderFolderUI("📂 미분류", "none", unclassified));
            foldersData.forEach(f => listUI.appendChild(renderFolderUI("📂 " + f.name, f.id, chaptersData.filter(c => c.folderId === f.id))));
        }

        function renderFolderUI(name, id, chapters) {
            const div = document.createElement('div');
            const isOpen = (currentFolderId === id);
            div.innerHTML = `<div class="folder-header" onclick="toggleFolder('${id}')"><span>${name}</span></div><ul class="chapter-list ${isOpen ? '' : 'hidden'}"></ul>`;
            const ul = div.querySelector('ul');
            
            chapters.forEach(c => {
                const li = document.createElement('li'); 
                li.className = `chapter-item-container ${c.id === currentChapterId ? 'active' : ''}`;
                li.dataset.id = c.id; 
                li.draggable = true; // 드래그 기능 유지
                li.innerHTML = `<div class="chapter-item">${c.title || '제목 없음'}</div><div class="delete-btn">×</div>`;
                
                // 드래그 이벤트 연결
                li.addEventListener('dragstart', handleDragStart);
                li.addEventListener('dragover', handleDragOver);
                li.addEventListener('drop', handleDrop);
                li.addEventListener('dragend', handleDragEnd);

                // [v5.72 핵심] 클릭 이벤트 처리 방식 변경
                li.addEventListener('click', (e) => {
                    if (e.target.classList.contains('delete-btn')) {
                        deleteChapter(c.id, e);
                    } else {
                        // 다른 글 클릭 시 현재 편집 세션 즉시 종료
                        isTyping = false; 
                        clearTimeout(saveTimer);
                        loadChapter(c.id);
                    }
                });

                ul.appendChild(li);
            });
            return div;
        }

        async function loadChapter(id) {
            currentChapterId = id; 
            localStorage.setItem('lastChapterId', id);
            const snap = await getDoc(doc(db, "myNovels", id));
            if (snap.exists()) {
                const data = snap.data();
                titleInput.value = data.title; 
                editor.innerHTML = data.content;
                lastSavedContent = data.content;
                lastSaveDisplay.innerText = formatTime(data.updatedAt);
                updateWordCount(); 
                if(window.innerWidth <= 768) closeSidebar(); 
                renderAll();
            }
        }

        // --- 드래그 앤 드롭 로직 ---
        let dragSrcEl = null;
        function handleDragStart(e) { dragSrcEl = this; this.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
        function handleDragOver(e) { if (e.preventDefault) e.preventDefault(); return false; }
        async function handleDrop(e) {
            e.stopPropagation();
            if (dragSrcEl !== this) {
                const list = this.parentNode;
                const nodes = Array.from(list.children);
                const fromIdx = nodes.indexOf(dragSrcEl);
                const toIdx = nodes.indexOf(this);
                if (fromIdx < toIdx) list.insertBefore(dragSrcEl, this.nextSibling);
                else list.insertBefore(dragSrcEl, this);
                const batch = writeBatch(db);
                Array.from(list.children).forEach((item, index) => { batch.update(doc(db, "myNovels", item.dataset.id), { order: index }); });
                await batch.commit();
            }
            return false;
        }
        function handleDragEnd() { this.classList.remove('dragging'); }

        // --- 편집 및 저장 로직 ---
        const processSave = (type) => {
            syncStatus.style.color = "#ff4d4d";
            clearTimeout(saveTimer);
            clearTimeout(typingEndTimer);
            saveTimer = setTimeout(async () => {
                if(isComposing) return;
                const now = Date.now();
                if(type === 'world') { await setDoc(doc(db, "app_settings", "world_memo"), { content: worldMemo.value }); }
                else {
                    if(!currentChapterId) return;
                    await setDoc(doc(db, "myNovels", currentChapterId), { title: titleInput.value, content: editor.innerHTML, updatedAt: now }, { merge: true });
                    lastSaveDisplay.innerText = formatTime(now);
                }
                syncStatus.style.color = "#4ade80"; 
                typingEndTimer = setTimeout(() => { isTyping = false; }, 2000);
            }, 1000);
        };

        editor.addEventListener('compositionstart', () => { isComposing = true; });
        editor.addEventListener('compositionend', () => { isComposing = false; updateWordCount(); processSave('epi'); });
        editor.addEventListener('input', () => { isTyping = true; if (!isComposing) { updateWordCount(); processSave('epi'); } });
        titleInput.addEventListener('input', () => processSave('epi'));
        worldMemo.addEventListener('input', () => processSave('world'));

        editor.addEventListener('paste', (e) => {
            e.preventDefault();
            const text = (e.originalEvent || e).clipboardData.getData('text/plain');
            const cleanHtml = text.split(/\r?\n/).map(line => `<div>${line.length > 0 ? line : '<br>'}</div>`).join("");
            document.execCommand("insertHTML", false, cleanHtml);
            updateWordCount();
        });

        function formatTime(ts) { if(!ts) return "저장 기록 없음"; const n = new Date(ts); return `${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`; }
        function updateWordCount() { if(isComposing) return; const cnt = (editor.textContent || "").replace(/\r\n/g, "\n").trim().length; document.getElementById('word-count').innerText = cnt.toLocaleString() + '자'; document.getElementById('progress-bar').style.width = Math.min((cnt / settings.goalWords) * 100, 100) + "%"; }
        
        onSnapshot(doc(db, "app_settings", "global_v1"), (sDoc) => { if (sDoc.exists()) { settings = { ...settings, ...sDoc.data() }; applySettings(); } });
        window.checkAuth = () => { if(document.getElementById('pw-input').value === "0000") { document.getElementById('lock-screen').style.display = 'none'; sessionStorage.setItem('isStudioAuth', 'true'); startApp(); } };
        if(sessionStorage.getItem('isStudioAuth') === 'true') { document.getElementById('lock-screen').style.display = 'none'; startApp(); }

        function applySettings() {
            document.documentElement.style.setProperty('--font-size', settings.fontSize + 'rem');
            document.getElementById('display-goal').innerText = parseInt(settings.goalWords).toLocaleString();
            document.getElementById('display-font').innerText = settings.fontSize;
            updateWordCount();
        }

        window.toggleFolder = (id) => { currentFolderId = (currentFolderId === id) ? 'none' : id; localStorage.setItem('lastFolderId', currentFolderId); renderAll(); };
        window.switchTab = async (type) => {
            document.getElementById('tab-epi').classList.toggle('active', type === 'epi');
            document.getElementById('tab-world').classList.toggle('active', type === 'world');
            document.getElementById('content-epi').classList.toggle('hidden', type !== 'epi');
            document.getElementById('content-world').classList.toggle('hidden', type !== 'world');
            if(type === 'world' && worldMemo.value === "") { const wSnap = await getDoc(doc(db, "app_settings", "world_memo")); if(wSnap.exists()) worldMemo.value = wSnap.data().content; }
        };

        window.restoreVersion = () => { if(confirm("복구?")) { editor.innerHTML = lastSavedContent; updateWordCount(); } };
        window.copyAllText = () => { navigator.clipboard.writeText(editor.innerText).then(() => alert("복사됨!")); };
        window.exportText = () => { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([editor.innerText], { type: 'text/plain' })); a.download = `${titleInput.value || '제목없음'}.txt`; a.click(); };
        window.setGoal = () => { const v = prompt("목표:", settings.goalWords); if(v) setDoc(doc(db, "app_settings", "global_v1"), { goalWords: parseInt(v) }, { merge: true }); };
        window.setFontSize = () => { const v = prompt("크기:", settings.fontSize); if(v) setDoc(doc(db, "app_settings", "global_v1"), { fontSize: parseFloat(v) }, { merge: true }); };
        window.addNewFolder = async () => { const n = prompt("새 폴더:"); if(n) await setDoc(doc(db, "folders", 'fd'+Date.now()), { name: n, createdAt: Date.now() }); };
        window.addNewChapter = async () => { if(currentFolderId === 'none') return alert("폴더 선택!"); const id = 'ch'+Date.now(); await setDoc(doc(db, "myNovels", id), { title: "새 에피소드", content: "", folderId: currentFolderId, order: chaptersData.length, createdAt: Date.now(), updatedAt: Date.now() }); loadChapter(id); };
        window.deleteChapter = async (id, e) => { e.stopPropagation(); if(confirm("삭제?")) await deleteDoc(doc(db, "myNovels", id)); };
        window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('active');
        window.closeSidebar = () => document.getElementById('sidebar').classList.remove('active');
    </script>
</body>
</html>
