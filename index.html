<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cloud Studio v5.83 FINAL</title>
    <style>
        /* [1. 전역 설정] */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --font-size: 1.15rem; --line-height: 1.85; --primary-blue: #4a90e2; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #1a1a1a; color: #d4d4d4; font-family: 'Pretendard', sans-serif; }
        .app-container { display: flex; width: 100vw; height: 100vh; overflow: hidden; position: relative; }

        /* [2. 사이드바 - 클릭 보장 레이아웃] */
        .sidebar { 
            width: 280px; min-width: 280px; height: 100%; 
            background: #111; border-right: 1px solid #333; 
            padding: 20px; display: flex; flex-direction: column; 
            z-index: 9999; /* 어떤 레이어보다 상단에 위치 */
            position: relative; pointer-events: auto; 
        }
        @media (max-width: 768px) { 
            .sidebar { position: fixed; left: 0; transform: translateX(-100%); transition: 0.3s; } 
            .sidebar.active { transform: translateX(0); } 
        }
        
        .tab-menu { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .tab-btn { flex: 1; padding: 8px; font-size: 0.7rem; background: none; border: 1px solid #333; color: #555; cursor: pointer; border-radius: 4px; }
        .tab-btn.active { background: #2a2a2a; color: #fff; border-color: var(--primary-blue); }

        .sidebar-content { flex: 1; overflow-y: auto; overflow-x: hidden; }
        .hidden { display: none !important; }

        .chapter-list { list-style: none; padding: 0; margin: 5px 0; }
        .chapter-item-container { 
            display: flex; align-items: center; border-radius: 4px; margin-bottom: 2px; 
            background: #1a1a1a; min-height: 48px; border: 1px solid transparent;
        }
        .chapter-item-container.active { background: #252525 !important; border-left: 4px solid var(--primary-blue); }
        
        .drag-handle { width: 35px; height: 48px; display: flex; align-items: center; justify-content: center; color: #333; cursor: grab; flex-shrink: 0; }
        
        /* 클릭 영역을 크게 확보 */
        .chapter-click-area { 
            flex: 1; padding: 12px 10px; font-size: 0.85rem; color: #777; 
            cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .active .chapter-click-area { color: #fff; font-weight: bold; }
        .delete-btn { width: 40px; height: 48px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: #444; cursor: pointer; }

        /* [3. 메인 에디터 영역] */
        .main-content { flex: 1; height: 100%; overflow-y: auto; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; padding: 40px 20px 160px 20px; }
        .editor-container { width: 100%; max-width: 800px; }
        #chapter-title { width: 100%; font-size: 1.8rem; border: none; background: transparent; color: #fff; outline: none; margin-bottom: 30px; font-weight: bold; }
        #editor { width: 100%; min-height: 70vh; font-size: var(--font-size); line-height: var(--line-height); color: #d4d4d4; outline: none; white-space: break-spaces; word-break: break-all; padding-bottom: 350px; }

        /* 하단바 및 기타 */
        .status-bar { position: fixed; bottom: 0; left: 280px; right: 0; background: #111; border-top: 1px solid #222; z-index: 998; }
        @media (max-width: 768px) { .status-bar { left: 0; } }
        .status-info { padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; }
        #progress-bar { height: 3px; background: var(--primary-blue); width: 0%; }
        
        #lock-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #111; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h2 style="color:var(--primary-blue); letter-spacing:4px;">STUDIO LOCK</h2>
        <input type="password" id="pw-input" placeholder="Password" onkeypress="if(event.keyCode==13) checkAuth()" style="padding:15px; background:#222; border:1px solid #333; color:white; text-align:center; outline:none; border-radius:8px;">
        <button onclick="checkAuth()" style="margin-top:15px; padding:10px 40px; background:var(--primary-blue); border:none; color:white; border-radius:6px; cursor:pointer; font-weight:bold;">ENTER</button>
    </div>

    <div class="app-container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header"><h2>CLOUD STUDIO</h2></div>
            <div class="tab-menu">
                <button class="tab-btn active" onclick="switchTab('epi')">📝 에피소드</button>
                <button class="tab-btn" onclick="switchTab('world')">🌎 세계관</button>
            </div>
            <div id="content-epi" class="sidebar-content">
                <div style="display:flex; gap:8px; margin-bottom:20px;">
                    <button onclick="addNewFolder()" style="flex:1; padding:10px; background:#2a2a2a; border:1px solid #444; color:#fff; border-radius:6px; font-size:0.75rem;">📁 폴더</button>
                    <button onclick="addNewChapter()" style="flex:1; padding:10px; background:#2a2a2a; border:1px solid #444; color:#fff; border-radius:6px; font-size:0.75rem;">📝 에피</button>
                </div>
                <div id="folder-list">데이터 로드 중...</div>
            </div>
        </div>

        <div class="main-content" onclick="document.getElementById('sidebar').classList.remove('active')">
            <div class="editor-container">
                <div style="display:flex; gap:8px; margin-bottom:20px; justify-content:flex-end;">
                    <button onclick="copyAllText()" style="background:none; border:1px solid #333; color:#aaa; padding:6px 12px; border-radius:4px; font-size:0.75rem; cursor:pointer;">📋 복사</button>
                    <button onclick="restoreVersion()" style="background:none; border:1px solid #333; color:#888; padding:6px 12px; border-radius:4px; font-size:0.75rem; cursor:pointer;">⏳ 복구</button>
                </div>
                <input type="text" id="chapter-title" placeholder="제목을 입력하세요">
                <div id="editor" contenteditable="true" spellcheck="true" lang="ko"></div>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <div id="progress-bar"></div>
        <div class="status-info">
            <div>목표:<span id="display-goal">5,000</span> | <span id="word-count">0자</span></div>
            <div style="display:flex; align-items:center; gap:5px;"><span id="last-save-time" style="color:#555;">저장 기록 없음</span><div id="sync-status">●</div><span style="font-weight:bold; margin-left:10px;">v5.83</span></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, deleteDoc, collection, onSnapshot, query, orderBy, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 사용자 API 설정
        const firebaseConfig = { 
 apiKey: "AIzaSyC4FjTYr8xxPH9y7H13h8EzIf-CxKb8QkI",
  authDomain: "my-typi-app.firebaseapp.com",
  projectId: "my-typi-app",
  storageBucket: "my-typi-app.firebasestorage.app",
  messagingSenderId: "793573516752",
  appId: "1:793573516752:web:2b3d20a8c432a0b5d445d5" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        enableIndexedDbPersistence(db).catch(() => {});

        const editor = document.getElementById('editor');
        const titleInput = document.getElementById('chapter-title');
        let currentChapterId = localStorage.getItem('lastChapterId') || '';
        let isTyping = false, isComposing = false, chaptersData = [], foldersData = [];

        // [v5.83 핵심] 이벤트 위임: 목록 전체에서 클릭을 가로채서 처리 (씹힘 방지)
        document.getElementById('folder-list').addEventListener('click', (e) => {
            const clickArea = e.target.closest('.chapter-click-area');
            const deleteBtn = e.target.closest('.delete-btn');
            
            if (clickArea) {
                const id = clickArea.closest('.chapter-item-container').dataset.id;
                console.log("클릭 감지 ID:", id);
                isTyping = false;
                loadChapter(id);
            } else if (deleteBtn) {
                const id = deleteBtn.closest('.chapter-item-container').dataset.id;
                if(confirm("삭제하시겠습니까?")) deleteDoc(doc(db, "myNovels", id));
            }
        });

        function startApp() {
            // 폴더 리스트 실시간 감시
            onSnapshot(query(collection(db, "folders"), orderBy("createdAt", "asc")), (snap) => {
                foldersData = []; snap.forEach(d => foldersData.push({id: d.id, ...d.data()}));
                renderAll();
            });
            // 챕터 리스트 실시간 감시
            onSnapshot(collection(db, "myNovels"), (snap) => {
                chaptersData = []; snap.forEach(d => chaptersData.push({id: d.id, ...d.data()}));
                chaptersData.sort((a, b) => (a.order || 0) - (b.order || 0));
                renderAll();
                // [v5.83 핵심] 데이터가 로드되었고 에디터가 비어있다면 즉시 로드
                if(!isTyping && currentChapterId && editor.innerHTML === "") {
                    loadChapter(currentChapterId);
                }
            });
        }

        async function loadChapter(id) {
            currentChapterId = id; localStorage.setItem('lastChapterId', id);
            try {
                const snap = await getDoc(doc(db, "myNovels", id));
                if (snap.exists()) {
                    const d = snap.data();
                    titleInput.value = d.title || "";
                    editor.innerHTML = d.content || "";
                    document.getElementById('last-save-time').innerText = new Date(d.updatedAt).toLocaleTimeString();
                    updateWordCount(); renderAll();
                }
            } catch (e) { console.error("로드 에러:", e); }
        }

        function renderAll() {
            const listUI = document.getElementById('folder-list');
            listUI.innerHTML = '';
            foldersData.forEach(f => {
                const div = document.createElement('div');
                div.innerHTML = `<div class="folder-header">📂 ${f.name}</div><ul class="chapter-list"></ul>`;
                const ul = div.querySelector('ul');
                chaptersData.filter(c => c.folderId === f.id).forEach(c => {
                    const li = document.createElement('li');
                    li.className = `chapter-item-container ${c.id === currentChapterId ? 'active' : ''}`;
                    li.dataset.id = c.id;
                    li.innerHTML = `<div class="drag-handle">::</div><div class="chapter-click-area">${c.title || '제목 없음'}</div><div class="delete-btn">×</div>`;
                    ul.appendChild(li);
                });
                listUI.appendChild(div);
            });
        }

        // 저장 로직 (입력 중단 1초 후)
        let saveTimer;
        const processSave = () => {
            document.getElementById('sync-status').style.color = "red";
            clearTimeout(saveTimer);
            saveTimer = setTimeout(async () => {
                if(isComposing || !currentChapterId) return;
                await setDoc(doc(db, "myNovels", currentChapterId), { title: titleInput.value, content: editor.innerHTML, updatedAt: Date.now() }, { merge: true });
                document.getElementById('sync-status').style.color = "#4ade80";
                isTyping = false;
            }, 1000);
        };

        editor.addEventListener('compositionstart', () => isComposing = true);
        editor.addEventListener('compositionend', () => { isComposing = false; processSave(); });
        editor.addEventListener('input', () => { isTyping = true; if(!isComposing) processSave(); updateWordCount(); });
        titleInput.addEventListener('input', processSave);

        window.checkAuth = () => { if(document.getElementById('pw-input').value === "0000") { document.getElementById('lock-screen').style.display = 'none'; startApp(); } };
        window.updateWordCount = () => { document.getElementById('word-count').innerText = editor.textContent.length + '자'; };
        window.copyAllText = () => { navigator.clipboard.writeText(editor.innerText).then(() => alert("복사되었습니다.")); };
        
        // 5.57 원본의 다른 기능들(검색, 폴더추가 등)은 이 패턴을 유지하며 추가 가능합니다.
        window.addNewChapter = async () => { const id = 'ch'+Date.now(); await setDoc(doc(db, "myNovels", id), { title: "새 에피소드", content: "", folderId: foldersData[0]?.id || "", order: chaptersData.length, updatedAt: Date.now() }); loadChapter(id); };
    </script>
</body>
</html>
