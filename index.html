<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cloud Studio v5.84 Full</title>
    <style>
        /* [1. 전역 스타일 및 아이폰 흔들림 제어] */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --font-size: 1.15rem; --line-height: 1.85; --primary-blue: #4a90e2; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #1a1a1a; color: #d4d4d4; font-family: 'Pretendard', -apple-system, sans-serif; overflow-x: hidden; }
        .app-container { display: flex; width: 100vw; height: 100vh; overflow: hidden; position: relative; }

        /* [2. 사이드바 - 클릭 보장 레이아웃] */
        .sidebar { 
            width: 280px; min-width: 280px; height: 100%; 
            background: #111; border-right: 1px solid #333; 
            padding: 20px; display: flex; flex-direction: column; 
            z-index: 1000; transition: transform 0.3s;
        }
        @media (max-width: 768px) { .sidebar { position: fixed; left: 0; transform: translateX(-100%); } .sidebar.active { transform: translateX(0); } }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .sidebar-header h2 { font-size: 0.75rem; color: #444; letter-spacing: 2px; margin: 0; cursor: pointer; }
        
        .tab-menu { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .tab-btn { flex: 1; padding: 8px; font-size: 0.7rem; background: none; border: 1px solid #333; color: #555; cursor: pointer; border-radius: 4px; }
        .tab-btn.active { background: #2a2a2a; color: #fff; border-color: var(--primary-blue); }
        .sidebar-content { flex: 1; overflow-y: auto; overflow-x: hidden; }
        .hidden { display: none !important; }

        /* 리스트 아이템 UI (클릭 우선순위 최적화) */
        .folder-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 8px; cursor: pointer; color: #bbb; font-weight: bold; font-size: 0.85rem; border-bottom: 1px solid #222; }
        .chapter-list { list-style: none; padding: 0 0 0 5px; margin: 5px 0; min-height: 20px; }
        .chapter-item-container { display: flex; align-items: center; border-radius: 4px; margin-bottom: 2px; background: #1a1a1a; transition: background 0.15s; min-height: 48px; position: relative; }
        .chapter-item-container.active { background: #222 !important; border-left: 3.5px solid var(--primary-blue); }
        .chapter-item-container.dragging { opacity: 0.2; background: #000; }
        
        .drag-handle { width: 35px; height: 48px; display: flex; align-items: center; justify-content: center; color: #333; cursor: grab; font-size: 0.9rem; flex-shrink: 0; }
        .chapter-click-area { flex: 1; padding: 12px 5px; font-size: 0.85rem; color: #777; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; z-index: 5; }
        .active .chapter-click-area { color: #fff; }
        .delete-btn { width: 40px; height: 48px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: #444; opacity: 0.5; cursor: pointer; z-index: 10; }

        /* [3. 에디터 영역] */
        .main-content { flex: 1; height: 100%; overflow-y: auto; overflow-x: hidden; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; padding: 40px 20px 160px 20px; box-sizing: border-box; }
        .editor-container { width: 100%; max-width: 800px; position: relative; }
        #chapter-title { width: 100%; font-size: 1.8rem; border: none; background: transparent; color: #fff; outline: none; margin-bottom: 30px; font-weight: bold; }
        #editor { width: 100%; min-height: 70vh; font-size: var(--font-size); line-height: var(--line-height); color: #d4d4d4; outline: none; white-space: break-spaces; word-break: break-all; padding-bottom: 350px; }
        #editor div, #editor p { margin: 0 !important; padding: 0 !important; min-height: 1.2em; }

        /* [4. 통합 검색 패널] */
        #search-panel { position: absolute; top: 0; right: 0; width: 350px; height: 100%; background: #111; border-left: 1px solid #333; z-index: 1500; display: flex; flex-direction: column; transform: translateX(100%); transition: 0.3s; padding: 20px; }
        #search-panel.active { transform: translateX(0); }
        .search-res-item { padding: 15px 10px; border-bottom: 1px solid #222; cursor: pointer; }
        .search-res-title { font-weight: bold; font-size: 0.8rem; color: var(--primary-blue); margin-bottom: 5px; }
        .search-res-snippet { font-size: 0.75rem; color: #888; line-height: 1.5; }
        .highlight { background: rgba(74, 144, 226, 0.3); color: #fff; padding: 0 2px; border-radius: 2px; }

        /* [5. 하단바 및 잠금화면] */
        .status-bar { position: fixed; bottom: 0; left: 280px; right: 0; background: #111; border-top: 1px solid #222; z-index: 998; }
        @media (max-width: 768px) { .status-bar { left: 0; } }
        .status-info { padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; }
        #progress-bar { height: 3px; background: var(--primary-blue); width: 0%; transition: 0.3s; }
        #lock-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #111; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #lock-screen input { padding: 15px; width: 220px; border-radius: 8px; border: 1px solid #333; background: #222; color: white; font-size: 1.2rem; text-align: center; outline: none; }
        .menu-toggle { position: fixed; top: 15px; left: 15px; z-index: 2000; background: #222; color: white; border: none; padding: 10px 15px; border-radius: 8px; display: none; }
        @media (max-width: 768px) { .menu-toggle { display: block; } }
    </style>
</head>
<body lang="ko">

    <div id="lock-screen">
        <h2 style="color:var(--primary-blue); letter-spacing:4px;">STUDIO LOCK</h2>
        <input type="password" id="pw-input" placeholder="Password" onkeypress="if(event.keyCode==13) checkAuth()">
        <button onclick="checkAuth()" style="margin-top:15px; padding:10px 40px; background:var(--primary-blue); border:none; color:white; border-radius:6px; cursor:pointer;">ENTER</button>
    </div>

    <button class="menu-toggle" onclick="toggleSidebar()">☰ 메뉴</button>
    
    <div class="app-container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header"><h2 onclick="location.reload()">CLOUD STUDIO</h2></div>
            <div class="tab-menu">
                <button class="tab-btn active" id="tab-epi" onclick="switchTab('epi')">📝 에피소드</button>
                <button class="tab-btn" id="tab-world" onclick="switchTab('world')">🌎 설정/메모</button>
            </div>
            <div id="content-epi" class="sidebar-content">
                <div style="display:flex; gap:8px; margin-bottom:20px;">
                    <button onclick="addNewFolder()" style="flex:1; padding:10px; background:#2a2a2a; border:1px solid #444; color:#fff; border-radius:6px; font-size:0.75rem;">📁 폴더</button>
                    <button onclick="addNewChapter()" style="flex:1; padding:10px; background:#2a2a2a; border:1px solid #444; color:#fff; border-radius:6px; font-size:0.75rem;">📝 에피</button>
                </div>
                <div id="folder-list">데이터 로딩 중...</div>
            </div>
            <div id="content-world" class="sidebar-content hidden">
                <textarea id="world-memo-area" style="width:100%; height:85%; background:transparent; border:none; color:#888; font-size:0.85rem; line-height:1.7; outline:none; resize:none; padding:10px; box-sizing:border-box;" placeholder="세계관 설정을 기록하세요..."></textarea>
            </div>
        </div>

        <div class="main-content" id="main-scroll-area" onclick="closeSidebar(); closeSearch();">
            <div class="editor-container">
                <div style="display:flex; gap:8px; margin-bottom:20px; justify-content:flex-end;">
                    <button onclick="event.stopPropagation(); openSearch();" style="background:#222; border:1px solid var(--primary-blue); color:var(--primary-blue); padding:6px 12px; border-radius:4px; font-size:0.75rem; cursor:pointer;">🔍 검색</button>
                    <button onclick="copyAllText()" style="background:none; border:1px solid #333; color:#aaa; padding:6px 12px; border-radius:4px; font-size:0.75rem; cursor:pointer;">📋 복사</button>
                    <button onclick="restoreVersion()" style="background:none; border:1px solid #333; color:#888; padding:6px 12px; border-radius:4px; font-size:0.75rem; cursor:pointer;">⏳ 복구</button>
                    <button onclick="exportText()" style="background:none; border:1px solid #333; color:#888; padding:6px 12px; border-radius:4px; font-size:0.75rem; cursor:pointer;">💾 TXT</button>
                </div>
                <input type="text" id="chapter-title" placeholder="제목을 입력하세요">
                <div id="editor" contenteditable="true" spellcheck="true" lang="ko"></div>
            </div>
        </div>

        <div id="search-panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="font-size:0.9rem; margin:0; color:#fff;">통합 검색 결과</h3>
                <span onclick="closeSearch()" style="cursor:pointer; font-size:1.2rem; color:#555;">&times;</span>
            </div>
            <div id="search-results-list" style="flex:1; overflow-y:auto;"></div>
        </div>
    </div>

    <div class="status-bar">
        <div id="progress-bar"></div>
        <div class="status-info">
            <div>목표:<span id="display-goal">5,000</span> | 글자:<span id="display-font">1.15</span></div>
            <div style="display:flex; align-items:center; gap:5px;">
                <span id="last-save-time" style="color:#555; margin-right:10px;">저장 기록 없음</span>
                <div id="word-count" style="margin-right:10px;">0자</div>
                <div id="sync-status" style="font-weight:bold;">●</div>
                <span style="color:#222; font-weight:bold; margin-left:10px;">v5.84</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, deleteDoc, collection, onSnapshot, query, orderBy, writeBatch, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 사용자 Firebase 설정값 입력
        const firebaseConfig = { 

apiKey: "AIzaSyC4FjTYr8xxPH9y7H13h8EzIf-CxKb8QkI",
  authDomain: "my-typi-app.firebaseapp.com",
  projectId: "my-typi-app",
  storageBucket: "my-typi-app.firebasestorage.app",
  messagingSenderId: "793573516752",
  appId: "1:793573516752:web:2b3d20a8c432a0b5d445d5"
 };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        enableIndexedDbPersistence(db).catch(() => {});

        document.execCommand('defaultParagraphSeparator', false, 'div');
        const editor = document.getElementById('editor');
        const titleInput = document.getElementById('chapter-title');
        const worldMemo = document.getElementById('world-memo-area');
        const syncStatus = document.getElementById('sync-status');

        let currentChapterId = localStorage.getItem('lastChapterId') || '';
        let currentFolderId = localStorage.getItem('lastFolderId') || 'none';
        let isTyping = false, isComposing = false, lastSavedContent = "", foldersData = [], chaptersData = [], settings = { goalWords: 5000, fontSize: 1.15 };

        // [v5.84 핵심] 이벤트 위임 (사이드바 클릭 보장)
        document.getElementById('folder-list').addEventListener('click', (e) => {
            const clickArea = e.target.closest('.chapter-click-area');
            const deleteBtn = e.target.closest('.delete-btn');
            if (clickArea) {
                const id = clickArea.closest('.chapter-item-container').dataset.id;
                isTyping = false; editor.innerHTML = ""; loadChapter(id);
            } else if (deleteBtn) {
                const id = deleteBtn.closest('.chapter-item-container').dataset.id;
                if(confirm("에피소드를 삭제하시겠습니까?")) deleteDoc(doc(db, "myNovels", id));
            }
        });

        function startApp() {
            onSnapshot(query(collection(db, "folders"), orderBy("createdAt", "asc")), (snap) => {
                foldersData = []; snap.forEach(d => foldersData.push({id: d.id, ...d.data()}));
                renderAll();
            });
            onSnapshot(collection(db, "myNovels"), (snap) => {
                chaptersData = []; snap.forEach(d => chaptersData.push({id: d.id, ...d.data()}));
                chaptersData.sort((a, b) => (a.order || 0) - (b.order || 0) || (a.createdAt || 0) - (b.createdAt || 0));
                renderAll();
                if(!isTyping && currentChapterId && editor.innerHTML === "") { loadChapter(currentChapterId); }
            });
            onSnapshot(doc(db, "app_settings", "global_v1"), (sDoc) => { if (sDoc.exists()) { settings = { ...settings, ...sDoc.data() }; applySettings(); } });
        }

        async function loadChapter(id) {
            currentChapterId = id; localStorage.setItem('lastChapterId', id);
            const snap = await getDoc(doc(db, "myNovels", id));
            if (snap.exists()) {
                const data = snap.data();
                titleInput.value = data.title; editor.innerHTML = data.content;
                lastSavedContent = data.content; updateWordCount(); renderAll();
                document.getElementById('last-save-time').innerText = new Date(data.updatedAt).toLocaleTimeString();
            }
        }

        function renderAll() {
            const listUI = document.getElementById('folder-list'); listUI.innerHTML = '';
            const unclassified = chaptersData.filter(c => !c.folderId);
            if(unclassified.length > 0) listUI.appendChild(renderFolderUI("📂 미분류", "none", unclassified));
            foldersData.forEach(f => listUI.appendChild(renderFolderUI("📂 " + f.name, f.id, chaptersData.filter(c => c.folderId === f.id))));
        }

        function renderFolderUI(name, id, chapters) {
            const div = document.createElement('div');
            const isOpen = (currentFolderId === id);
            div.innerHTML = `<div class="folder-header" onclick="toggleFolder('${id}')"><span>${name}</span></div><ul class="chapter-list ${isOpen ? '' : 'hidden'}"></ul>`;
            const ul = div.querySelector('ul');
            chapters.forEach(c => {
                const li = document.createElement('li'); 
                li.className = `chapter-item-container ${c.id === currentChapterId ? 'active' : ''}`;
                li.dataset.id = c.id;
                li.innerHTML = `<div class="drag-handle" draggable="true">::</div><div class="chapter-click-area">${c.title || '제목 없음'}</div><div class="delete-btn">×</div>`;
                li.querySelector('.drag-handle').addEventListener('dragstart', (e) => { dragSrcEl = li; e.dataTransfer.effectAllowed = 'move'; });
                li.addEventListener('dragover', (e) => e.preventDefault());
                li.addEventListener('drop', handleDrop);
                ul.appendChild(li);
            });
            return div;
        }

        let dragSrcEl = null;
        async function handleDrop(e) {
            e.stopPropagation(); const targetLi = e.target.closest('.chapter-item-container');
            if (dragSrcEl && targetLi && dragSrcEl !== targetLi) {
                const list = targetLi.parentNode;
                if(Array.from(list.children).indexOf(dragSrcEl) < Array.from(list.children).indexOf(targetLi)) list.insertBefore(dragSrcEl, targetLi.nextSibling);
                else list.insertBefore(dragSrcEl, targetLi);
                const batch = writeBatch(db);
                Array.from(list.children).forEach((item, index) => { batch.update(doc(db, "myNovels", item.dataset.id), { order: index }); });
                await batch.commit();
            }
        }

        let saveTimer;
        const processSave = (type) => {
            syncStatus.style.color = "red"; clearTimeout(saveTimer);
            saveTimer = setTimeout(async () => {
                if(isComposing || !currentChapterId) return;
                const now = Date.now();
                if(type === 'world') { await setDoc(doc(db, "app_settings", "world_memo"), { content: worldMemo.value }); }
                else {
                    await setDoc(doc(db, "myNovels", currentChapterId), { title: titleInput.value, content: editor.innerHTML, updatedAt: now }, { merge: true });
                }
                syncStatus.style.color = "#4ade80"; isTyping = false;
            }, 1000);
        };

        editor.addEventListener('compositionstart', () => isComposing = true);
        editor.addEventListener('compositionend', () => { isComposing = false; processSave(); });
        editor.addEventListener('input', () => { isTyping = true; if(!isComposing) processSave(); updateWordCount(); });
        titleInput.addEventListener('input', processSave);
        worldMemo.addEventListener('input', () => processSave('world'));

        window.openSearch = () => {
            const keyword = prompt("검색어 입력:"); if(!keyword) return;
            const resList = document.getElementById('search-results-list'); resList.innerHTML = "";
            document.getElementById('search-panel').classList.add('active');
            chaptersData.filter(c => c.content.includes(keyword) || c.title.includes(keyword)).forEach(res => {
                const item = document.createElement('div'); item.className = 'search-res-item';
                item.innerHTML = `<div class="search-res-title">${res.title}</div><div class="search-res-snippet">...${res.content.substring(0,50)}...</div>`;
                item.onclick = () => { loadChapter(res.id); closeSearch(); };
                resList.appendChild(item);
            });
        };
        window.closeSearch = () => document.getElementById('search-panel').classList.remove('active');
        window.checkAuth = () => { if(document.getElementById('pw-input').value === "0000") { document.getElementById('lock-screen').style.display = 'none'; startApp(); } };
        window.toggleFolder = (id) => { currentFolderId = (currentFolderId === id ? 'none' : id); localStorage.setItem('lastFolderId', currentFolderId); renderAll(); };
        window.switchTab = (t) => { document.getElementById('tab-epi').classList.toggle('active', t==='epi'); document.getElementById('tab-world').classList.toggle('active', t==='world'); document.getElementById('content-epi').classList.toggle('hidden', t!=='epi'); document.getElementById('content-world').classList.toggle('hidden', t!=='world'); };
        window.updateWordCount = () => { document.getElementById('word-count').innerText = editor.textContent.length + '자'; };
        window.copyAllText = () => { navigator.clipboard.writeText(editor.innerText).then(() => alert("복사됨!")); };
        window.exportText = () => { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([editor.innerText], {type:'text/plain'})); a.download = `${titleInput.value}.txt`; a.click(); };
        window.restoreVersion = () => { if(confirm("복구?")) { editor.innerHTML = lastSavedContent; updateWordCount(); } };
        window.applySettings = () => { document.documentElement.style.setProperty('--font-size', settings.fontSize + 'rem'); document.getElementById('display-goal').innerText = settings.goalWords; document.getElementById('display-font').innerText = settings.fontSize; };
        window.addNewChapter = async () => { const id = 'ch'+Date.now(); await setDoc(doc(db, "myNovels", id), { title: "새 에피소드", content: "", folderId: currentFolderId === 'none' ? "" : currentFolderId, order: chaptersData.length, updatedAt: Date.now() }); loadChapter(id); };
        window.addNewFolder = async () => { const n = prompt("새 폴더:"); if(n) await setDoc(doc(db, "folders", 'fd'+Date.now()), { name: n, createdAt: Date.now() }); };
        window.closeSidebar = () => document.getElementById('sidebar').classList.remove('active');
        window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('active');
    </script>
</body>
</html>
